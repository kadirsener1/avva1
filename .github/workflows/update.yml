name: Avva Sports Link Güncelle

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılık Kur
        run: pip install requests

      - name: Linkleri Güncelle
        run: python scrape_avva.py

      - name: Commit ve Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          git diff --staged --quiet || git commit -m "🔄 Linkler güncellendi - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
